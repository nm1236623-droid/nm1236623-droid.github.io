<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sid Chen (陳佑軒) 的應用程式廣告驗證與開發者頁面">
    <title>Sid Chen - Ads Verification</title>
    <style>
        :root {
            --primary-color: #2ea44f; /* GitHub 綠色風格 */
            --bg-color: #0d1117;     /* GitHub 深色背景 */
            --text-color: #c9d1d9;
            --card-bg: #161b22;
            --border-color: #30363d;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            line-height: 1.6;
        }
        .container {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        h1 {
            color: #ffffff;
            margin-bottom: 5px;
        }
        h2 {
            font-size: 1.2rem;
            color: #8b949e;
            font-weight: normal;
            margin-top: 0;
            margin-bottom: 30px;
        }
        .status-box {
            background-color: rgba(46, 164, 79, 0.1);
            border: 1px solid var(--primary-color);
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 30px;
        }
        .status-text {
            color: var(--primary-color);
            font-weight: bold;
            font-size: 1.1rem;
            margin: 0;
        }
        .btn {
            display: inline-block;
            background-color: var(--primary-color);
            color: #ffffff;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            transition: background-color 0.2s;
            margin: 5px;
        }
        .btn:hover {
            background-color: #2c974b;
        }
        .btn-outline {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
        }
        .btn-outline:hover {
            background-color: var(--border-color);
        }
        footer {
            margin-top: 40px;
            font-size: 0.9rem;
            color: #8b949e;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sid Chen (陳佑軒)</h1>
        <h2>Android 軟體開發者</h2>

        <div class="status-box">
            <p class="status-text">✓ 廣告驗證網域已啟用 (Ads Verification Active)</p>
        </div>

        <p>此網域主要用於存放 Android 應用程式（包含 FitnessApp 等專案）的 <code>app-ads.txt</code> 授權數位賣方驗證檔案，以符合 Google Play 與廣告聯播網的規範。</p>

        <div style="margin-top: 30px;">
            <a href="app-ads.txt" class="btn" target="_blank">檢視 app-ads.txt</a>
            
            <a href="https://github.com/nm1236623-droid" class="btn btn-outline" target="_blank">GitHub Profile</a>
        </div>

        <footer>
            &copy; 2026 Sid Chen. All rights reserved.
        </footer>
    </div>

</body>
</html>
